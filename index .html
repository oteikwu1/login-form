<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Registration Form</title>
</head>
<body>
    <div class="form-container">
     <h1 class="form-title">Registration Form</h1> 
    <p class="form-info">Already have a account ? 
        <span><a href="#">Sign in</a></span></p>
    <form action="" method="post" id="login-form">
      
      
        <label for="name-input" class="name-label">
            Names
        </label>
        <div class="name-container">
            <input type="text" id="name-input" 
            placeholder="John Doe" required>
        </div>

        <label for="email-input" class="email-label">
            Email
        </label>
        <div class="name-container">
            <input type="email" id="email-input" 
            placeholder="john@gmail.com">
        </div>

        <label for="pass-input" class="pass-label">
            Password
        </label>
        <div class="pass-container">
            <div>
            <input type="password" id="pass-input" 
            placeholder="Create password" required>
            <img src="assest/eye-open.png" 
            alt="" width="20" class="eye-open">
            </div>
        </div>

        <label for="repeat-pass" class="repeat-pass-label">
            Repeat Password
        </label>

        <div class="repeat-pass-container">
            <input type="password" id="repeat-pass" 
            placeholder="Repeat Password">
            
        <img src="assest/eye-open.png" alt="" 
        width="20" class="eye-open-repeat">
        </div>

        <div class="check-container">
        <input type="checkbox" id="checkbox"> <span class="checkbox-text">
            By creating your account you have
            the <a href="#">terms of use</a> and 
            our <br> <a href="#">privacy policy</a>
        </span>
        </div>

        <div class="btn-container">
            <button id="sign-up-btn">Sign Up</button>
        </div>
    </div>
    </form>

    <script src="script.js"></script>
</body>
</html>
