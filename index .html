<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Registration Form</title>
</head>
<body>
    <div class="form-container">
     <h1 class="form-title">Registration Form</h1> 
    <p class="form-info">Already have a account ? 
        <span><a href="#">Sign in</a></span></p>
    <form action="" method="post" id="login-form">
      
      
        <label for="name" class="name-label">
            Names
        </label>
        <div class="name-container">
            <input type="text" id="name" 
            placeholder="John Doe" required>
        </div>

        <label for="email" class="email-label">
            Email
        </label>
        <div class="name-container">
            <input type="email" id="email" 
            placeholder="john@gmail.com">
        </div>

        <label for="pass" class="pass-label">
            Password
        </label>
        <div class="name-container">
            <input type="password" id="pass" 
            placeholder="Create password" required>
        </div>

        <label for="pass" class="repeat-pass-label">
            Repeat Password
        </label>
        <div class="name-container">
            <input type="password" id="pass" 
            placeholder="Repeat Password">
        </div>

        <div class="check-container">
        <input type="checkbox"> <span class="checkbox-text">
            By creating your account you have
            the <a href="#">terms of use</a> and 
            our <br> <a href="#">privacy policy</a>
        </span>
        </div>

        <div class="btn-container">
            <button>Sign Up</button>
        </div>
    </div>
    </form>
</body>
</html>
